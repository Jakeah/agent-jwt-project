# Agentforce deployment registry — the single source of truth for SOMA/MOMA.
#
# Each entry is one Salesforce MIAW Embedded Service deployment that this app can hand a
# verified identity to. Adding an agent (SOMA) or an org (MOMA) is a new row here — no code
# change. The JWT minter reads `audience` + `key_id` from the matching entry; the embed
# snippet reads the org/deployment/url fields.
#
# Values for the `chess-agent` org are filled in during Phase 4 (after the MIAW deployment +
# User Verification config exist). Until then they are placeholders.
#
# `default_deployment` selects which entry the app uses when no ?deployment= param is given.

default_deployment: chess_support

deployments:
  chess_support:
    label: "Chess Support (chess-agent org)"
    org_id: "00Dg8000008l1Ac"               # Salesforce org id (15-char, as embeddedservice_bootstrap.init expects)
    deployment_name: "Chess_Coach_Web"       # Embedded Service deployment dev name
    site_url: "https://trailsignup-e8eb68b2222256.my.site.com/ESWChessCoachWeb1782171470213"  # ESW bootstrap base URL
    scrt2_url: "https://trailsignup-e8eb68b2222256.my.salesforce-scrt.com"  # SCRT2 messaging URL
    # --- User Verification JWT claims ---
    issuer: "https://chess-agent-jwt-95c105a581a5.herokuapp.com"   # JWT `iss` — this app
    audience: "https://trailsignup-e8eb68b2222256.my.salesforce.com"  # JWT `aud` — Setup keys trust on iss+kid (no aud field in the keyset); this is the org My Domain as recipient. Confirm empirically via session trace; adjust if the runtime rejects on aud.
    key_id: "chess-identity-key-1"          # JWT header `kid` — matches the public key label in Setup
    token_ttl_seconds: 300                  # short-lived (5 min)
